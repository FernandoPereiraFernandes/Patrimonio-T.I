# docker-compose.yml - PatrimônioTI completo (App + MariaDB)
# Deploy de produção com instalação automática do banco

version: "3.9"

services:
  # ===== Banco de Dados MariaDB =====
  mariadb:
    image: mariadb:11
    container_name: patrimonioti-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-patrimonioti_root_2024}
      MYSQL_DATABASE: ${DB_NAME:-patrimonioti}
      MYSQL_USER: ${DB_USER:-patrimonioti}
      MYSQL_PASSWORD: ${DB_PASSWORD:-patrimonioti_app_2024}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"  # Remova esta linha em produção se não quiser expor o banco
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - patrimonioti-net

  # ===== Aplicação PatrimônioTI =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patrimonioti-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # URL de conexão usando o usuário da aplicação
      DATABASE_URL: "mysql://${DB_USER:-patrimonioti}:${DB_PASSWORD:-patrimonioti_app_2024}@mariadb:3306/${DB_NAME:-patrimonioti}"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-in-production-32chars-min}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - patrimonioti-net
    # Não expõe o banco para a app via localhost - usa a rede interna

volumes:
  mariadb_data:
    driver: local

networks:
  patrimonioti-net:
    driver: bridge
